name: Backend Continuous Integration

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'infrastructure/**'
      - 'services/**'
      - 'shared/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches:
      - develop
    paths:
      - 'infrastructure/**'
      - 'services/**'
      - 'shared/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Run Build
      run: mvn clean package -DskipTests
    
    - name: Run Tests
      run: mvn test
    
    - name: SonarQube Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    
    - name: Upload Coverage Reports
      uses: codecov/codecov-action@v3
      with:
        files: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
    
    - name: Build Docker Images
      run: |
        docker build -t tisqra/api-gateway:${{ github.sha }} infrastructure/api-gateway/
        docker build -t tisqra/config-server:${{ github.sha }} infrastructure/config-server/
        docker build -t tisqra/discovery-service:${{ github.sha }} infrastructure/discovery-service/
        docker build -t tisqra/user-service:${{ github.sha }} services/user-service/
        docker build -t tisqra/event-service:${{ github.sha }} services/event-service/
        docker build -t tisqra/notification-service:${{ github.sha }} services/notification-service/
    
    - name: Comment PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ Build and tests passed! Docker images built successfully.'
          })
