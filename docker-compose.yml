services:
  # ========================================
  # PostgreSQL Database
  # ========================================
  postgres:
    image: postgres:16-alpine
    container_name: tisqra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      POSTGRES_MULTIPLE_DATABASES: user_db,organization_db,event_db,order_db,ticket_db,payment_db,notification_db,analytics_db,keycloak_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - eventticket-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # Redis Cache
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: tisqra-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-root}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eventticket-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # Zookeeper for Kafka
  # ========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: tisqra-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - eventticket-network

  # ========================================
  # Kafka Message Broker
  # ========================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tisqra-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - eventticket-network
    healthcheck:
      # The CLI tool can be slow on busy machines; give it more time.
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 30s
      timeout: 30s
      retries: 5

  # ========================================
  # Keycloak Identity & Access Management
  # ========================================
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: tisqra-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-root}
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_HEALTH_ENABLED: true
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    networks:
      - eventticket-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: http://localhost\r\nConnection: close\r\n\r\n' >&3;grep 'HTTP/1.1 200 OK' <&3"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========================================
  # Discovery Service (Eureka)
  # ========================================
  discovery-service:
    build:
      context: .
      dockerfile: ./infrastructure/discovery-service/Dockerfile
    container_name: tisqra-discovery
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8761:8761"
    networks:
      - eventticket-network
    healthcheck:
      # Discovery has no custom security on /actuator/health, but if actuator changes,
      # fall back to a simple TCP check so the service isn't marked unhealthy incorrectly.
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || nc -z localhost 8761"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========================================
  # Config Server
  # ========================================
  config-server:
    build:
      context: .
      dockerfile: ./infrastructure/config-server/Dockerfile
    container_name: tisqra-config
    restart: unless-stopped
    environment:
      # Config server must include 'native' (otherwise it defaults to git backend and requires a git URI).
      SPRING_PROFILES_ACTIVE: docker,native
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
    ports:
      - "8888:8888"
    depends_on:
      - discovery-service
    networks:
      - eventticket-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/health || nc -z localhost 8888"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========================================
  # API Gateway
  # ========================================
  api-gateway:
    build:
      context: .
      dockerfile: ./infrastructure/api-gateway/Dockerfile
    container_name: tisqra-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      REDIS_PASSWORD: ${REDIS_PASSWORD:-root}
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service
      - config-server
      - keycloak
    networks:
      - eventticket-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || nc -z localhost 8080"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========================================
  # Business Microservices
  # ========================================
  
  user-service:
    build:
      context: .
      dockerfile: ./services/user-service/Dockerfile
    container_name: tisqra-identity
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-root}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      # Allow user-service to manage users in Keycloak
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis
      - kafka
      - discovery-service
      - keycloak
    networks:
      - eventticket-network

  event-service:
    build:
      context: .
      dockerfile: ./services/event-service/Dockerfile
    container_name: tisqra-event
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-root}
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - redis
      - kafka
      - discovery-service
    networks:
      - eventticket-network

  order-service:
    build:
      context: .
      dockerfile: ./services/order-service/Dockerfile
    container_name: tisqra-order
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-root}
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - redis
      - kafka
      - discovery-service
    networks:
      - eventticket-network

  payment-service:
    build:
      context: .
      dockerfile: ./services/payment-service/Dockerfile
    container_name: tisqra-payment
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-root}
    ports:
      - "8086:8086"
    depends_on:
      - postgres
      - redis
      - kafka
      - discovery-service
    networks:
      - eventticket-network

  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    container_name: tisqra-notification
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      BREVO_SMTP_HOST: ${BREVO_SMTP_HOST}
      BREVO_SMTP_USERNAME: ${BREVO_SMTP_USERNAME}
      BREVO_SMTP_PASSWORD: ${BREVO_SMTP_PASSWORD}
    ports:
      - "8087:8087"
    depends_on:
      - postgres
      - kafka
      - discovery-service
    networks:
      - eventticket-network

  analytics-service:
    build:
      context: .
      dockerfile: ./services/analytics-service/Dockerfile
    container_name: tisqra-analytics
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-root}
    ports:
      - "8088:8088"
    depends_on:
      - postgres
      - redis
      - kafka
      - discovery-service
    networks:
      - eventticket-network

  # ========================================
  # Organization Service
  # ========================================
  organization-service:
    build:
      context: .
      dockerfile: ./services/organization-service/Dockerfile
    container_name: tisqra-organization
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-root}
    ports:
      - "8089:8086"
    depends_on:
      - postgres
      - redis
      - kafka
      - discovery-service
      - keycloak
    networks:
      - eventticket-network

  # ========================================
  # Ticket Service
  # ========================================
  ticket-service:
    build:
      context: .
      dockerfile: ./services/ticket-service/Dockerfile
    container_name: tisqra-ticket
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-root}
    ports:
      - "8085:8085"
    depends_on:
      - postgres
      - redis
      - kafka
      - discovery-service
      - keycloak
    networks:
      - eventticket-network

networks:
  eventticket-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data: