server:
  port: 8080

spring:
  application:
    name: api-gateway

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,org.springframework.boot.actuate.autoconfigure.data.redis.RedisHealthContributorAutoConfiguration

  config:
    import: optional:configserver:http://config-server:8888

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:root}
      timeout: 2s
  
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # Identity Service Routes
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**, /api/users/**

        # Organization Service Routes
        - id: organization-service
          uri: lb://organization-service
          predicates:
            - Path=/api/organizations/**, /api/subscriptions/**

        # Event Service Routes
        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/api/events/**, /api/ticket-categories/**, /api/promo-codes/**

        # Order Service Routes
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**, /api/cart/**

        # Ticket Service Routes
        - id: ticket-service
          uri: lb://ticket-service
          predicates:
            - Path=/api/tickets/**, /api/validate/**

        # Payment Service Routes
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**, /api/refunds/**

        # Notification Service Routes
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

        # Analytics Service Routes
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**, /api/dashboard/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/event-ticketing
          jwk-set-uri: http://keycloak:8080/realms/event-ticketing/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: api-gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  health:
    redis:
      enabled: false