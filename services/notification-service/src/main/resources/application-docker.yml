spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/notification_db

  kafka:
    bootstrap-servers: kafka:9092

  # Prefer unified EMAIL_* env vars; fall back to BREVO_* for backward compatibility.
  mail:
    host: ${EMAIL_HOST:${BREVO_SMTP_HOST:smtp-relay.brevo.com}}
    port: ${EMAIL_PORT:${BREVO_SMTP_PORT:587}}
    username: ${EMAIL_USER:${BREVO_SMTP_USERNAME:}}
    password: ${EMAIL_PASS:${BREVO_SMTP_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: ${EMAIL_SMTP_AUTH:true}
          starttls:
            enable: ${EMAIL_SMTP_STARTTLS:true}
            required: ${EMAIL_SMTP_STARTTLS_REQUIRED:false}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/event-ticketing
          jwk-set-uri: http://keycloak:8080/realms/event-ticketing/protocol/openid-connect/certs

management:
  health:
    mail:
      enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
  instance:
    hostname: notification-service
