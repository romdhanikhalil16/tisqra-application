server:
  port: 8088

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: ${POSTGRES_USER:eventticket_admin}
    password: ${POSTGRES_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Brevo SMTP Configuration
  mail:
    host: ${BREVO_SMTP_HOST:smtp-relay.brevo.com}
    port: ${BREVO_SMTP_PORT:587}
    username: ${BREVO_SMTP_USERNAME:}
    password: ${BREVO_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/tisqra
          jwk-set-uri: http://localhost:8180/realms/tisqra/protocol/openid-connect/certs

# Brevo Configuration
brevo:
  sender:
    email: ${BREVO_SENDER_EMAIL:noreply@eventticket.com}
    name: ${BREVO_SENDER_NAME:Event Ticketing Platform}

# Firebase Cloud Messaging Configuration
fcm:
  credentials:
    file: ${FCM_CREDENTIALS_FILE:/app/config/firebase-credentials.json}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.tisqra.notification: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
