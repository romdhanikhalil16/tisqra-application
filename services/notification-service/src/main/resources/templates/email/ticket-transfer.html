<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Transferred to You</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background-color: #17A2B8; color: white; padding: 20px; text-align: center;">
        <h1>🎟️ Ticket Transferred!</h1>
    </div>
    
    <div style="padding: 20px; background-color: #f9f9f9;">
        <h2>Hi <span th:text="${recipientName}">User</span>,</h2>
        
        <p>Great news! A ticket has been transferred to you.</p>
        
        <div style="background-color: white; padding: 15px; margin: 20px 0; border-left: 4px solid #17A2B8;">
            <h3 style="margin-top: 0;">Ticket Details</h3>
            <p><strong>Event:</strong> <span th:text="${eventName}">Event Name</span></p>
            <p><strong>Ticket Number:</strong> <span th:text="${ticketNumber}">TKT-123456</span></p>
            <p><strong>From:</strong> <span th:text="${fromName}">Sender Name</span></p>
        </div>
        
        <div style="text-align: center; margin: 30px 0;">
            <a href="http://localhost:8080/my-tickets" 
               style="background-color: #17A2B8; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; display: inline-block;">
                View Ticket
            </a>
        </div>
    </div>
    
    <div style="background-color: #333; color: white; padding: 15px; text-align: center; font-size: 12px;">
        <p>&copy; 2026 Event Ticketing Platform. All rights reserved.</p>
    </div>
</body>
</html>
