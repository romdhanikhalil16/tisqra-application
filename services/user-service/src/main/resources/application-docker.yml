spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/user_db
    username: ${POSTGRES_USER:eventticket_admin}
    password: ${POSTGRES_PASSWORD:changeme}

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:changeme}

  kafka:
    bootstrap-servers: kafka:9092

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/tisqra
          jwk-set-uri: http://keycloak:8080/realms/tisqra/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
  instance:
    hostname: user-service
